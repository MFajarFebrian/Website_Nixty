<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Office 365 Retail Store</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="./_nuxt/default.C8Y79b0h.css">
  <link rel="shortcut icon" href="./favicon.ico">
  <base href="./">
  <script>
    // Override localStorage and sessionStorage to prevent errors
    try {
      // Test if storage is accessible
      window.localStorage.getItem('test');
      window.sessionStorage.getItem('test');
    } catch (e) {
      // If not accessible, create dummy storage objects
      var storageMock = {
        getItem: function() { return null; },
        setItem: function() { return null; },
        removeItem: function() { return null; },
        clear: function() { return null; },
        key: function() { return null; },
        length: 0
      };
      Object.defineProperty(window, 'localStorage', { value: storageMock });
      Object.defineProperty(window, 'sessionStorage', { value: storageMock });
    }
  </script>
  <script type="module" src="./_nuxt/xnOkjXsX.js"></script>
</head>
<body>
  <div id="__nuxt" class="isolate">
    <!-- If this text is visible, there's an issue with the JavaScript loading -->
    <div style="text-align: center; padding: 50px; font-family: system-ui, -apple-system, sans-serif;">
      <h1>Office 365 Retail Store</h1>
      <p>Loading the store...</p>
      <p>If this message persists, please try refreshing the page or checking your internet connection.</p>
      <p><a href="./index.html">Return to static home page</a></p>
    </div>
  </div>
</body>
</html>
